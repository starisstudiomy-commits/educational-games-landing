<style>
  :root {
    --momo-color: #34d399;
    --kiki-color: #22c55e;
    --atom-color: #3b82f6;
    --bg-cream: #fff8ec;
    --pink: #ff8fab;
    --yellow: #ffd166;
    --purple: #a78bfa;
    --ink: #2d2a4a;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: 'Baloo 2', 'Comic Sans MS', 'Segoe UI', sans-serif;
    background: linear-gradient(180deg, #fff8ec 0%, #fef2f7 40%, #eef6ff 100%);
    color: var(--ink);
    overflow-x: hidden;
  }

  @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Nunito:wght@400;600;700;800&display=swap');
  body, button, input { font-family: 'Nunito', sans-serif; }
  h1, h2, h3, .heading-font { font-family: 'Baloo 2', 'Nunito', sans-serif; }

  a { text-decoration: none; }

  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 20px;
  }

  /* NAVBAR */
  .navbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    max-width: 1100px;
    margin: 0 auto;
  }
  .navbar .brand {
    font-weight: 800;
    font-size: 22px;
    color: var(--ink);
  }
  .navbar .brand span { color: var(--pink); }

  /* HERO */
  .hero {
    position: relative;
    padding: 40px 20px 80px;
    text-align: center;
    overflow: hidden;
  }
  .hero-badge {
    display: inline-block;
    background: #fff;
    border-radius: 999px;
    padding: 8px 18px;
    font-weight: 700;
    font-size: 14px;
    color: var(--pink);
    box-shadow: 0 6px 0 rgba(0,0,0,0.05);
    margin-bottom: 18px;
  }
  .hero h1 {
    font-size: clamp(32px, 6vw, 56px);
    line-height: 1.15;
    margin: 0 0 16px;
    font-weight: 800;
  }
  .hero h1 .highlight {
    background: linear-gradient(90deg, var(--pink), var(--purple));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .hero p.subtitle {
    font-size: clamp(16px, 2.4vw, 20px);
    max-width: 640px;
    margin: 0 auto 32px;
    color: #5b5876;
    font-weight: 600;
  }
  .hero-cta {
    display: inline-block;
    background: var(--pink);
    color: #fff;
    font-weight: 800;
    font-size: 18px;
    padding: 16px 36px;
    border-radius: 999px;
    box-shadow: 0 6px 0 #d16b8a;
    transition: transform .15s ease;
  }
  .hero-cta:active { transform: translateY(4px); box-shadow: 0 2px 0 #d16b8a; }

  .hero-mascots {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-top: 48px;
    flex-wrap: wrap;
  }
  .hero-mascots img {
    width: 130px;
    height: 130px;
    object-fit: contain;
    filter: drop-shadow(0 12px 14px rgba(0,0,0,0.12));
    animation: float 3.2s ease-in-out infinite;
  }
  .hero-mascots img:nth-child(2) { animation-delay: .4s; }
  .hero-mascots img:nth-child(3) { animation-delay: .8s; }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-14px); }
  }

  .blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(0px);
    opacity: .5;
    z-index: -1;
  }

  /* SECTION HEADINGS */
  .section { padding: 70px 20px; }
  .section-title {
    text-align: center;
    font-size: clamp(26px, 4vw, 38px);
    font-weight: 800;
    margin-bottom: 12px;
  }
  .section-subtitle {
    text-align: center;
    color: #5b5876;
    font-weight: 600;
    max-width: 600px;
    margin: 0 auto 44px;
  }

  /* FEATURES */
  .features-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 24px;
  }
  .feature-card {
    background: #fff;
    border-radius: 24px;
    padding: 28px 22px;
    text-align: center;
    box-shadow: 0 10px 0 rgba(0,0,0,0.04), 0 4px 20px rgba(0,0,0,0.05);
  }
  .feature-card .emoji {
    font-size: 42px;
    display: block;
    margin-bottom: 14px;
  }
  .feature-card h3 { margin: 0 0 8px; font-size: 19px; }
  .feature-card p { margin: 0; color: #5b5876; font-size: 14.5px; line-height: 1.5; }

  /* HOW TO USE */
  .steps {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
  }
  .step-card {
    background: #fff;
    border-radius: 20px;
    padding: 24px 20px;
    position: relative;
    border: 3px dashed #ffe1ea;
  }
  .step-number {
    width: 36px; height: 36px;
    background: var(--purple);
    color: #fff;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: 800;
    margin-bottom: 12px;
  }
  .step-card h4 { margin: 0 0 6px; font-size: 16.5px; }
  .step-card p { margin: 0; font-size: 14px; color: #5b5876; }

  /* PRODUCT SHOWCASE */
  .product-block {
    display: flex;
    align-items: center;
    gap: 40px;
    background: #fff;
    border-radius: 28px;
    padding: 32px;
    margin-bottom: 28px;
    box-shadow: 0 10px 0 rgba(0,0,0,0.04), 0 4px 20px rgba(0,0,0,0.05);
    flex-wrap: wrap;
  }
  .product-block.reverse { flex-direction: row-reverse; }
  .product-block .mascot-col { flex: 0 0 160px; text-align: center; }
  .product-block .mascot-col img.mascot { width: 130px; }
  .product-block .info-col { flex: 1; min-width: 240px; }
  .product-block h3 { font-size: 24px; margin: 0 0 10px; }
  .product-block p { color: #5b5876; margin: 0 0 14px; }
  .shot-row { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 6px; }
  .shot-row img { width: 140px; height: 100px; object-fit: cover; border-radius: 12px; flex-shrink: 0; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
  .price-tag {
    display: inline-block;
    background: var(--yellow);
    color: #7a4a00;
    font-weight: 800;
    padding: 6px 16px;
    border-radius: 999px;
    margin-top: 10px;
  }

  /* PACKAGES / ORDER FORM */
  .packages-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
    gap: 20px;
    margin-bottom: 40px;
  }
  .package-card {
    background: #fff;
    border-radius: 22px;
    padding: 22px;
    text-align: center;
    border: 3px solid transparent;
    cursor: pointer;
    transition: all .15s ease;
    box-shadow: 0 8px 0 rgba(0,0,0,0.04);
  }
  .package-card.selected {
    border-color: var(--pink);
    transform: translateY(-4px);
  }
  .package-card img { width: 90px; height: 90px; object-fit: contain; margin-bottom: 10px; }
  .package-card h4 { margin: 0 0 6px; font-size: 17px; }
  .package-card .price { font-weight: 800; font-size: 20px; color: var(--pink); }
  .package-card .bundle-badge {
    display: inline-block; background: var(--purple); color: #fff;
    font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 999px; margin-bottom: 8px;
  }

  .order-form {
    background: #fff;
    border-radius: 28px;
    padding: 36px;
    max-width: 560px;
    margin: 0 auto;
    box-shadow: 0 10px 0 rgba(0,0,0,0.04), 0 4px 30px rgba(0,0,0,0.06);
  }
  .order-form label { display: block; font-weight: 700; margin-bottom: 6px; font-size: 14px; }
  .order-form input, .order-form select {
    width: 100%;
    padding: 12px 14px;
    border-radius: 14px;
    border: 2px solid #eee;
    margin-bottom: 16px;
    font-size: 15px;
    font-family: inherit;
  }
  .order-form input:focus, .order-form select:focus { outline: none; border-color: var(--pink); }

  .total-row {
    display: flex; justify-content: space-between; align-items: center;
    background: #fff8ec; border-radius: 16px; padding: 14px 18px; margin-bottom: 20px;
    font-weight: 800; font-size: 18px;
  }

  .submit-btn {
    width: 100%;
    background: var(--pink);
    color: #fff;
    font-weight: 800;
    font-size: 17px;
    padding: 16px;
    border: none;
    border-radius: 999px;
    box-shadow: 0 6px 0 #d16b8a;
    cursor: pointer;
  }
  .submit-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #d16b8a; }
  .submit-btn:disabled { opacity: .6; cursor: not-allowed; }

  .form-msg { text-align: center; font-weight: 700; margin-top: 14px; }
  .form-msg.error { color: #e0245e; }
  .form-msg.success { color: #16a34a; }

  /* PAYMENT / CONFIRMATION PANEL */
  .payment-panel {
    background: #fff;
    border-radius: 28px;
    padding: 36px;
    max-width: 560px;
    margin: 30px auto 0;
    text-align: center;
    box-shadow: 0 10px 0 rgba(0,0,0,0.04), 0 4px 30px rgba(0,0,0,0.06);
  }
  .payment-panel img.qr { width: 220px; border-radius: 16px; margin: 16px auto; box-shadow: 0 6px 20px rgba(0,0,0,0.1); }
  .bank-box {
    background: #f4f4ff; border-radius: 16px; padding: 16px; text-align: left; margin: 16px 0;
  }
  .bank-box div { margin-bottom: 4px; font-size: 15px; }
  .wa-btn {
    display: inline-block;
    background: #25D366;
    color: #fff;
    font-weight: 800;
    padding: 14px 28px;
    border-radius: 999px;
    margin-top: 10px;
  }
  .ref-badge {
    display: inline-block;
    background: var(--yellow);
    color: #7a4a00;
    font-weight: 800;
    padding: 8px 20px;
    border-radius: 999px;
    font-size: 18px;
    margin: 10px 0;
  }

  footer {
    text-align: center;
    padding: 40px 20px;
    color: #8b88a3;
    font-weight: 600;
    font-size: 14px;
  }

  .hidden { display: none !important; }

  @media (max-width: 640px) {
    .product-block, .product-block.reverse { flex-direction: column; text-align: center; }
    .shot-row { justify-content: center; }
  }
</style>
