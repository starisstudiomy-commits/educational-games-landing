<style>
  :root {
    --momo-color: #ec4899;
    --kiki-color: #4ade80;
    --atom-color: #c4b5fd;
    --navy: #0b1030;
    --navy-2: #1a1450;
    --purple-deep: #2a0e5e;
    --gold: #ffd166;
    --yellow: #ffe066;
    --pink: #ff5c8a;
    --purple: #a78bfa;
    --card-bg: rgba(255,255,255,0.07);
    --card-border: rgba(255,224,102,0.55);
    --ink: #ffffff;
    --muted: #d8d4f5;
  }

  * { box-sizing: border-box; }

  @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Fredoka+One&display=swap');

  body {
    margin: 0;
    font-family: 'Baloo 2', sans-serif;
    font-weight: 700;
    background:
      radial-gradient(circle at 15% 10%, rgba(255,209,102,0.10), transparent 40%),
      radial-gradient(circle at 85% 25%, rgba(236,72,153,0.14), transparent 40%),
      linear-gradient(160deg, var(--purple-deep) 0%, #1a1450 35%, var(--navy) 70%, #060815 100%);
    color: var(--ink);
    overflow-x: hidden;
    position: relative;
  }

  body, button, input, select { font-family: 'Baloo 2', sans-serif; font-weight: 700; }
  h1, h2, h3, h4, .heading-font { font-family: 'Fredoka One', 'Baloo 2', sans-serif; }
  .hero-cta, .submit-btn, .select-btn, .price-tag, .price, .popular-badge, .ref-badge, .wa-btn, .guarantee-wa, .brand {
    font-family: 'Fredoka One', 'Baloo 2', sans-serif;
  }

  a { text-decoration: none; }

  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 20px;
    position: relative;
    z-index: 2;
  }

  /* SCATTERED BACKGROUND SHAPES (fixed, behind everything) */
  .bg-shapes {
    position: absolute;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    overflow: hidden;
  }
  .bg-shapes span {
    position: absolute;
    opacity: 0.5;
    animation: drift 7s ease-in-out infinite;
  }
  .bg-shapes .circle { border-radius: 50%; background: var(--yellow); }
  .bg-shapes .square { background: var(--pink); border-radius: 6px; }
  .bg-shapes .diamond { background: var(--purple); border-radius: 6px; transform: rotate(45deg); }
  .bg-shapes .ring { border: 3px solid var(--yellow); border-radius: 50%; background: transparent; }
  .bg-shapes .star { color: var(--yellow); font-size: 20px; }

  .bg-shapes .s1 { top: 6%; left: 8%; width: 14px; height: 14px; animation-delay: 0s; }
  .bg-shapes .s2 { top: 14%; left: 82%; width: 10px; height: 10px; animation-delay: .6s; }
  .bg-shapes .s3 { top: 28%; left: 45%; width: 18px; height: 18px; animation-delay: 1.2s; }
  .bg-shapes .s4 { top: 38%; left: 6%; width: 22px; height: 22px; animation-delay: 1.8s; }
  .bg-shapes .s5 { top: 46%; left: 92%; width: 14px; height: 14px; animation-delay: 2.4s; }
  .bg-shapes .s6 { top: 58%; left: 20%; width: 12px; height: 12px; animation-delay: 3s; }
  .bg-shapes .s7 { top: 64%; left: 70%; width: 20px; height: 20px; animation-delay: .3s; }
  .bg-shapes .s8 { top: 74%; left: 40%; width: 10px; height: 10px; animation-delay: .9s; }
  .bg-shapes .s9 { top: 82%; left: 88%; width: 16px; height: 16px; animation-delay: 1.5s; }
  .bg-shapes .s10 { top: 90%; left: 12%; width: 18px; height: 18px; animation-delay: 2.1s; }
  .bg-shapes .s11 { top: 20%; left: 65%; width: 24px; height: 24px; animation-delay: 2.7s; }
  .bg-shapes .s12 { top: 96%; left: 55%; width: 12px; height: 12px; animation-delay: 3.3s; }

  @keyframes drift {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-16px) rotate(12deg); }
  }

  /* STITCHED BOX STYLE */
  .stitched {
    border: 3px dashed var(--card-border);
    position: relative;
  }
  .stitched::before {
    content: "";
    position: absolute;
    inset: 7px;
    border: 2px dashed rgba(255,255,255,0.25);
    border-radius: inherit;
    pointer-events: none;
  }

  /* HERO */
  .hero {
    position: relative;
    padding: 24px 20px 70px;
    overflow: hidden;
    background:
      radial-gradient(circle at 20% 15%, rgba(96,165,250,0.14), transparent 45%),
      linear-gradient(160deg, #071233 0%, #0a1a4a 45%, #061029 100%);
  }

  .navbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    max-width: 1100px;
    margin: 0 auto;
    padding: 16px 20px;
    position: relative;
    z-index: 2;
  }
  .navbar .brand {
    font-weight: 900;
    font-size: 20px;
    color: #fff;
  }
  .navbar .brand span { color: var(--yellow); }
  .navbar .tagline {
    font-size: 13px;
    font-weight: 800;
    color: var(--muted);
  }

  .hero-inner {
    position: relative;
    z-index: 2;
    text-align: center;
    padding-top: 20px;
  }
  .hero-badge {
    display: inline-block;
    background: rgba(255,255,255,0.1);
    border: 2px dashed var(--yellow);
    border-radius: 999px;
    padding: 8px 18px;
    font-weight: 800;
    font-size: 14px;
    color: #fff;
    margin-bottom: 20px;
  }
  .hero h1 {
    font-size: clamp(32px, 6vw, 54px);
    line-height: 1.15;
    margin: 0 0 18px;
    font-weight: 900;
    color: #fff;
  }
  .hero h1 .highlight { color: var(--yellow); }
  .hero p.subtitle {
    font-size: clamp(16px, 2.2vw, 19px);
    max-width: 640px;
    margin: 0 auto 30px;
    color: var(--muted);
    font-weight: 700;
  }
  .hero-cta {
    display: inline-block;
    background: var(--yellow);
    color: var(--navy);
    font-weight: 900;
    font-size: 18px;
    padding: 16px 36px;
    border-radius: 999px;
    box-shadow: 0 6px 0 #c9a12e;
    transition: transform .15s ease;
  }
  .hero-cta:active { transform: translateY(4px); box-shadow: 0 2px 0 #c9a12e; }

  .hero-trust {
    display: flex;
    justify-content: center;
    gap: 28px;
    flex-wrap: wrap;
    margin-top: 26px;
    font-size: 13px;
    font-weight: 800;
    color: var(--muted);
  }
  .hero-trust span { display: flex; align-items: center; gap: 6px; }

  /* HERO GAME CARDS */
  .hero-games {
    position: relative;
    z-index: 2;
    display: flex;
    justify-content: center;
    gap: 22px;
    flex-wrap: wrap;
    margin-top: 48px;
  }
  .hero-game-card {
    width: 200px;
    border-radius: 22px;
    padding: 22px 16px 18px;
    text-align: center;
    position: relative;
    background: var(--card-bg);
    border: 3px dashed var(--card-border);
    box-shadow: 0 14px 30px rgba(0,0,0,0.35);
    animation: float 3.6s ease-in-out infinite;
  }
  .hero-game-card:nth-child(2) { animation-delay: .3s; }
  .hero-game-card:nth-child(3) { animation-delay: .6s; }
  .hero-game-card .tahun-badge {
    position: absolute;
    top: 12px;
    right: 12px;
    background: var(--yellow);
    color: var(--navy);
    font-size: 10.5px;
    font-weight: 900;
    padding: 3px 10px;
    border-radius: 999px;
  }
  .hero-game-card img.hero-mascot {
    width: 110px;
    height: 110px;
    object-fit: contain;
    filter: drop-shadow(0 8px 14px rgba(0,0,0,0.35));
    margin-bottom: 10px;
  }
  .hero-game-card h4 {
    margin: 0 0 4px;
    font-size: 17px;
    color: #fff;
  }
  .hero-game-card p {
    margin: 0;
    font-size: 12.5px;
    color: var(--yellow);
    font-weight: 800;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-12px); }
  }

  /* SECTION HEADINGS */
  .section { padding: 70px 20px; position: relative; z-index: 2; }
  .section-title {
    text-align: center;
    font-size: clamp(26px, 4vw, 36px);
    font-weight: 900;
    margin-bottom: 12px;
    color: #fff;
  }
  .section-title .highlight { color: var(--yellow); }
  .section-subtitle {
    text-align: center;
    color: var(--muted);
    font-weight: 700;
    max-width: 600px;
    margin: 0 auto 44px;
  }

  /* FEATURES */
  .features-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 22px;
  }
  .feature-card {
    background: var(--card-bg);
    border-radius: 22px;
    padding: 30px 22px;
    text-align: center;
    border: 3px dashed var(--card-border);
  }
  .feature-card .icon-circle {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    margin: 0 auto 16px;
    background: rgba(255,224,102,0.18);
    border: 2px dashed var(--yellow);
  }
  .feature-card h3 { margin: 0 0 8px; font-size: 19px; color: var(--yellow); }
  .feature-card p { margin: 0; color: var(--muted); font-size: 14.5px; line-height: 1.5; font-weight: 700; }

  /* HOW TO USE */
  .steps {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
    position: relative;
  }
  .step-card {
    background: var(--card-bg);
    border-radius: 20px;
    padding: 26px 18px;
    position: relative;
    text-align: center;
    border: 3px dashed var(--card-border);
  }
  .step-number {
    width: 40px; height: 40px;
    color: var(--navy);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: 900;
    font-size: 17px;
    margin: 0 auto 14px;
  }
  .step-card:nth-child(1) .step-number { background: var(--pink); color: #fff; }
  .step-card:nth-child(2) .step-number { background: var(--yellow); }
  .step-card:nth-child(3) .step-number { background: var(--kiki-color); }
  .step-card:nth-child(4) .step-number { background: #60a5fa; }
  .step-card h4 { margin: 0 0 6px; font-size: 16.5px; color: #fff; }
  .step-card p { margin: 0; font-size: 14px; color: var(--muted); font-weight: 700; }

  /* PRODUCT SHOWCASE */
  .product-card {
    background: var(--card-bg);
    border-radius: 28px;
    border: 3px dashed var(--card-border);
    border-top: 8px solid transparent;
    padding: 32px;
    margin-bottom: 32px;
    overflow: hidden;
    min-width: 0;
  }
  .product-card.momo { border-top-color: var(--momo-color); }
  .product-card.kiki { border-top-color: var(--kiki-color); }
  .product-card.atom { border-top-color: var(--atom-color); }

  .product-header {
    display: flex;
    align-items: center;
    gap: 18px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .product-header img.mascot { width: 84px; height: 84px; object-fit: contain; flex-shrink: 0; }
  .product-heading { flex: 1; min-width: 160px; }
  .product-header h3 { font-size: 23px; margin: 0; color: #fff; }
  .subject-tag { display: block; font-size: 13.5px; font-weight: 800; color: var(--yellow); margin-top: 2px; }
  .product-header .price-tag { flex-shrink: 0; margin: 0; }

  .product-card > p { color: var(--muted); margin: 0 0 14px; min-width: 0; font-weight: 700; }
  .highlight-list { list-style: none; padding: 0; margin: 0 0 18px; min-width: 0; }
  .highlight-list li { font-size: 14px; color: var(--muted); margin-bottom: 8px; padding-left: 24px; position: relative; font-weight: 700; }
  .highlight-list li::before { content: "✅"; position: absolute; left: 0; }

  .slider-hint {
    font-size: 12.5px;
    font-weight: 800;
    color: var(--yellow);
    margin: 0 0 8px;
  }
  .screenshot-slider {
    display: flex;
    gap: 14px;
    overflow-x: auto;
    scroll-snap-type: x mandatory;
    padding: 4px 4px 10px;
    margin: 0 -4px;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .screenshot-slider::-webkit-scrollbar { display: none; }
  .screenshot-slider img {
    scroll-snap-align: start;
    flex: 0 0 auto;
    width: 190px;
    height: 328px;
    object-fit: cover;
    border-radius: 18px;
    border: 3px dashed var(--yellow);
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
  }

  .price-tag {
    display: inline-block;
    background: var(--yellow);
    color: var(--navy);
    font-weight: 900;
    padding: 6px 16px;
    border-radius: 999px;
    margin-top: 10px;
  }

  /* PACKAGES / PRICING CARDS */
  .packages-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
    gap: 24px;
    margin-bottom: 48px;
    align-items: stretch;
  }
  .package-card {
    background: var(--card-bg);
    border-radius: 24px;
    padding: 28px 22px;
    text-align: center;
    border: 3px dashed var(--card-border);
    cursor: pointer;
    transition: all .15s ease;
    display: flex;
    flex-direction: column;
    position: relative;
  }
  .package-card.popular {
    border-color: var(--pink);
    transform: translateY(-6px);
  }
  .package-card.selected {
    border-color: var(--yellow);
    box-shadow: 0 0 0 4px rgba(255,224,102,0.25);
  }
  .package-card .popular-badge {
    position: absolute;
    top: -14px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--pink);
    color: #fff;
    font-size: 11.5px;
    font-weight: 900;
    padding: 5px 16px;
    border-radius: 999px;
    white-space: nowrap;
  }
  .package-card .tag {
    display: inline-block;
    background: rgba(255,255,255,0.12);
    color: var(--yellow);
    font-size: 12px;
    font-weight: 800;
    padding: 4px 12px;
    border-radius: 999px;
    margin: 0 auto 14px;
  }
  .package-card img { width: 84px; height: 84px; object-fit: contain; margin: 0 auto 12px; }
  .package-card h4 { margin: 0 0 6px; font-size: 18px; color: #fff; }
  .package-card .price { font-weight: 900; font-size: 28px; color: var(--yellow); margin-bottom: 4px; }
  .package-card .price span { font-size: 13px; font-weight: 700; color: var(--muted); }
  .package-card .pkg-features {
    list-style: none;
    padding: 0;
    margin: 6px 0 18px;
    text-align: left;
    flex: 1;
  }
  .package-card .pkg-features li {
    font-size: 13.5px;
    color: var(--muted);
    margin-bottom: 8px;
    padding-left: 22px;
    position: relative;
    font-weight: 700;
  }
  .package-card .pkg-features li::before { content: "✅"; position: absolute; left: 0; }
  .package-card .select-btn {
    display: block;
    width: 100%;
    background: rgba(255,255,255,0.12);
    color: #fff;
    font-weight: 900;
    padding: 12px;
    border-radius: 999px;
    border: none;
    font-size: 14.5px;
    pointer-events: none;
  }
  .package-card.popular .select-btn { background: var(--pink); color: #fff; }
  .package-card.selected .select-btn { background: var(--yellow); color: var(--navy); }
  .package-card.selected .select-btn::after { content: " ✓ Dipilih"; }

  .order-form {
    background: var(--card-bg);
    border-radius: 28px;
    padding: 36px;
    max-width: 560px;
    margin: 0 auto;
    border: 3px dashed var(--card-border);
  }
  .order-form label { display: block; font-weight: 800; margin-bottom: 6px; font-size: 14px; color: #fff; }
  .order-form input, .order-form select {
    width: 100%;
    padding: 12px 14px;
    border-radius: 14px;
    border: 2px solid rgba(255,255,255,0.25);
    background: rgba(255,255,255,0.08);
    color: #fff;
    margin-bottom: 16px;
    font-size: 15px;
    font-family: inherit;
    font-weight: 700;
  }
  .order-form input::placeholder { color: rgba(255,255,255,0.5); }
  .order-form select option { color: #000; }
  .order-form input:focus, .order-form select:focus { outline: none; border-color: var(--yellow); }

  .total-row {
    display: flex; justify-content: space-between; align-items: center;
    background: rgba(255,224,102,0.14); border-radius: 16px; padding: 14px 18px; margin-bottom: 20px;
    font-weight: 900; font-size: 18px; color: var(--yellow);
  }

  .submit-btn {
    width: 100%;
    background: var(--yellow);
    color: var(--navy);
    font-weight: 900;
    font-size: 17px;
    padding: 16px;
    border: none;
    border-radius: 999px;
    box-shadow: 0 6px 0 #c9a12e;
    cursor: pointer;
  }
  .submit-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #c9a12e; }
  .submit-btn:disabled { opacity: .6; cursor: not-allowed; }

  .form-msg { text-align: center; font-weight: 800; margin-top: 14px; }
  .form-msg.error { color: #ff8fa3; }
  .form-msg.success { color: #4ade80; }

  /* PAYMENT / CONFIRMATION PANEL */
  .payment-panel {
    background: var(--card-bg);
    border-radius: 28px;
    padding: 36px;
    max-width: 560px;
    margin: 30px auto 0;
    text-align: center;
    border: 3px dashed var(--card-border);
  }
  .payment-panel h3 { color: #fff; }
  .payment-panel p { color: var(--muted); }
  .payment-panel img.qr { width: 220px; border-radius: 16px; margin: 16px auto; box-shadow: 0 6px 20px rgba(0,0,0,0.3); }
  .bank-box {
    background: rgba(255,255,255,0.08); border-radius: 16px; padding: 16px; text-align: left; margin: 16px 0;
  }
  .bank-box div { margin-bottom: 4px; font-size: 15px; color: #fff; }
  .wa-btn {
    display: inline-block;
    background: #25D366;
    color: #fff;
    font-weight: 900;
    padding: 14px 28px;
    border-radius: 999px;
    margin-top: 10px;
  }
  .ref-badge {
    display: inline-block;
    background: var(--yellow);
    color: var(--navy);
    font-weight: 900;
    padding: 8px 20px;
    border-radius: 999px;
    font-size: 18px;
    margin: 10px 0;
  }

  /* BOTTOM GUARANTEE / STICKY CTA BAR */
  .guarantee-bar {
    background: rgba(255,255,255,0.05);
    border-top: 3px dashed var(--card-border);
    color: #fff;
    padding: 22px 20px;
    position: relative;
    z-index: 2;
  }
  .guarantee-inner {
    max-width: 1100px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
    flex-wrap: wrap;
  }
  .guarantee-text { display: flex; align-items: center; gap: 12px; }
  .guarantee-text .shield { font-size: 26px; }
  .guarantee-text b { color: var(--yellow); display: block; font-size: 15px; }
  .guarantee-text span { color: var(--muted); font-size: 13px; }
  .guarantee-wa {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: #25D366;
    color: #fff;
    font-weight: 900;
    padding: 12px 22px;
    border-radius: 999px;
    font-size: 14.5px;
    white-space: nowrap;
  }

  footer {
    text-align: center;
    padding: 30px 20px;
    color: var(--muted);
    font-weight: 700;
    font-size: 14px;
    position: relative;
    z-index: 2;
  }

  .hidden { display: none !important; }

  @media (max-width: 780px) {
    .steps { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 640px) {
    .product-header { text-align: center; justify-content: center; }
    .product-heading { text-align: left; }
    .guarantee-inner { flex-direction: column; text-align: center; }
  }
</style>
